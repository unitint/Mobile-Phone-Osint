<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone OSINT - Investigation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">
                <span>📱</span> PHONE <span>OSINT</span>
            </span>
            <div>
                <span style="color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 2px;">
                    <i class="fas fa-shield-alt"></i> v1.0
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="hero-card">
                    <h1 class="hero-title">
                        <i class="fas fa-search" style="font-size: 2.5rem;"></i><br>
                        Phone OSINT
                    </h1>
                    <p class="hero-subtitle">
                        UNCOVER DIGITAL FOOTPRINTS
                    </p>
                    
                    <form action="/search" method="POST">
                        <div class="search-wrapper">
                            <span class="input-icon">
                                <i class="fas fa-phone"></i>
                            </span>
                            <input 
                                type="text" 
                                class="search-input" 
                                name="phone" 
                                placeholder="Enter phone number (e.g., 09946563099)"
                                required
                                autocomplete="off"
                            >
                        </div>
                        
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-robot"></i> Investigate
                        </button>
                    </form>
                    
                    <div class="features-grid">
                        <div class="feature-item">
                            <span class="icon">📘</span>
                            <span class="label">Facebook</span>
                        </div>
                        <div class="feature-item">
                            <span class="icon">📸</span>
                            <span class="label">Instagram</span>
                        </div>
                        <div class="feature-item">
                            <span class="icon">💬</span>
                            <span class="label">WhatsApp</span>
                        </div>
                        <div class="feature-item">
                            <span class="icon">✈️</span>
                            <span class="label">Telegram</span>
                        </div>
                        <div class="feature-item">
                            <span class="icon">🔍</span>
                            <span class="label">Google</span>
                        </div>
                        <div class="feature-item">
                            <span class="icon">📊</span>
                            <span class="label">Report</span>
                        </div>
                    </div>
                </div>
                
                {% if error %}
                <div class="alert alert-danger mt-4" style="background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #ff6b6b; border-radius: 15px; padding: 20px;">
                    <i class="fas fa-exclamation-triangle"></i> {{ error }}
                </div>
                {% endif %}
                
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
