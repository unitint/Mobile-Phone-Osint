{% extends "base.html" %}

{% block title %}Home - Phone OSINT{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        
        <div class="hero-card">
            <h1 class="hero-title">
                <i class="fas fa-search" style="font-size: 2.5rem;"></i><br>
                Phone OSINT
            </h1>
            <p class="hero-subtitle">
                UNCOVER DIGITAL FOOTPRINTS
            </p>
            
            <form action="/search" method="POST" id="searchForm">
                <div class="search-wrapper">
                    <span class="input-icon">
                        <i class="fas fa-phone"></i>
                    </span>
                    <input 
                        type="text" 
                        class="search-input" 
                        name="phone" 
                        id="phoneInput"
                        placeholder="Enter phone number (e.g., 09946563099)"
                        required
                        autocomplete="off"
                    >
                </div>
                
                <button type="submit" class="btn-submit" id="searchBtn">
                    <i class="fas fa-robot"></i> Investigate
                </button>
            </form>
            
            <div class="features-grid">
                <div class="feature-item">
                    <span class="icon">📘</span>
                    <span class="label">Facebook</span>
                </div>
                <div class="feature-item">
                    <span class="icon">📸</span>
                    <span class="label">Instagram</span>
                </div>
                <div class="feature-item">
                    <span class="icon">💬</span>
                    <span class="label">WhatsApp</span>
                </div>
                <div class="feature-item">
                    <span class="icon">✈️</span>
                    <span class="label">Telegram</span>
                </div>
                <div class="feature-item">
                    <span class="icon">🔍</span>
                    <span class="label">Search</span>
                </div>
                <div class="feature-item">
                    <span class="icon">📊</span>
                    <span class="label">Report</span>
                </div>
            </div>
        </div>
        
        {% if error %}
        <div class="alert alert-danger mt-4" style="background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #ff6b6b; border-radius: 15px; padding: 20px;">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Auto-focus on phone input
    document.getElementById('phoneInput')?.focus();
});
</script>
{% endblock %}
